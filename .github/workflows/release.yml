name: Release

# Compila los binarios standalone (sin Python) para Windows, macOS y Linux y los
# publica como assets de un GitHub Release. Se dispara al pushear un tag v*
# (ej. v0.1.1). workflow_dispatch corre solo el build (para probar, sin publicar).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # necesario para crear el Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: windows-latest, name: win,   ext: ".exe" }
          - { os: macos-latest,   name: mac,   ext: "" }
          - { os: ubuntu-latest,  name: linux, ext: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name DiagraMind-Local-${{ matrix.name }} local-backend/server.py
      - uses: actions/upload-artifact@v4
        with:
          name: DiagraMind-Local-${{ matrix.name }}
          path: dist/DiagraMind-Local-${{ matrix.name }}${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')   # solo publica en tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generar zip (versión script)
        run: bash local-backend/build_zip.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DiagraMind-Local-*
            descargas/Instalar-DiagraMind-win.bat
            descargas/Instalar-DiagraMind-mac.command
            descargas/Instalar-DiagraMind-linux.sh
            descargas/instalar-win.ps1
            diagramind-local.zip
